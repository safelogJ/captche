<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Captcha</title>

<style>

/* =====================================
   СТРАНИЦА
===================================== */
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    background: #ffffff;
    font-family: Arial, sans-serif;
}

/* =====================================
   ОСНОВНОЙ КОНТЕЙНЕР
===================================== */
.container {

    display: flex;
    flex-direction: column;

    align-items: center;

    gap: 15px;
}

/* =====================================
   ЦИФЕРБЛАТ
===================================== */
.clock {

    width: 300px;
    height: 300px;

    border-radius: 50%;
    border: 6px solid #444;

    background: #1a1a1a;

    position: relative;
}

/* =====================================
   ОБЩИЙ СТИЛЬ СТРЕЛОК
===================================== */
.hand {

    position: absolute;

    left: 50%;
    bottom: 50%;

    transform-origin: bottom center;

    border-radius: 10px;

    cursor: grab;
}

/* =====================================
   ЧАСОВАЯ СТРЕЛКА
===================================== */
.hour {

    width: 14px;
    height: 100px;

    background: white;
}

/* =====================================
   МИНУТНАЯ СТРЕЛКА
===================================== */
.minute {

    width: 8px;
    height: 130px;

    background: #aaaaaa;
}

/* =====================================
   ЦЕНТР ЧАСОВ
===================================== */
.center-dot {

    width: 30px;
    height: 30px;

    border-radius: 50%;

    background: red;

    position: absolute;

    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);
}

/* =====================================
   ТЕКСТОВЫЕ БЛОКИ
===================================== */
.info {

    color: black;

    font-size: 20px;

    min-width: 250px;

    text-align: center;
}

/* =====================================
   КНОПКА
===================================== */
button {

    padding: 12px 24px;

    border: none;

    background: #333;
    color: white;

    cursor: pointer;

    border-radius: 8px;

    font-size: 16px;
}

button:hover {
    background: #555;
}

</style>
</head>

<body>

<div class="container">

    <!-- ЦИФЕРБЛАТ -->
    <div class="clock" id="clock">

        <div class="hand hour" id="hourHand"></div>

        <div class="hand minute" id="minuteHand"></div>

        <div class="center-dot"></div>

    </div>

    <!-- ВРЕМЯ -->
    <div class="info" id="currentTime">
        GMT+3 00:00:00
    </div>

    <!-- КООРДИНАТЫ -->
    <div class="info" id="debugAngles">
        hour: 0° | minute: 0°
    </div>

    <!-- КНОПКА -->
    <button onclick="checkTime()">
        Check
    </button>

</div>

<script>

/* =====================================
   ЭЛЕМЕНТЫ
===================================== */
const hourHand = document.getElementById("hourHand");
const minuteHand = document.getElementById("minuteHand");
const clock = document.getElementById("clock");

/* =====================================
   ТЕКУЩИЕ УГЛЫ
===================================== */
let hourAngle = 0;
let minuteAngle = 0;

let activeHand = null;

/* =====================================
   ПОЛУЧИТЬ УГОЛ КУРСОРА
===================================== */
function getAngle(e) {

    const rect = clock.getBoundingClientRect();

    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    return Math.atan2(y, x) * 180 / Math.PI + 90;
}

/* =====================================
   ПОВОРОТ СТРЕЛКИ
===================================== */
function setRotation(el, angle) {

    el.style.transform = `rotate(${angle}deg)`;
}

/* =====================================
   ДВИЖЕНИЕ
===================================== */
function onMove(e) {

    if (!activeHand) return;

    const angle = getAngle(e);

    if (activeHand === "hour") {

        hourAngle = angle;

        setRotation(hourHand, hourAngle);
    }

    if (activeHand === "minute") {

        minuteAngle = angle;

        setRotation(minuteHand, minuteAngle);
    }
}

/* =====================================
   MOUSE
===================================== */
hourHand.addEventListener("mousedown", () => {
    activeHand = "hour";
});

minuteHand.addEventListener("mousedown", () => {
    activeHand = "minute";
});

document.addEventListener("mouseup", () => {
    activeHand = null;
});

document.addEventListener("mousemove", onMove);

/* =====================================
   TOUCH
===================================== */
hourHand.addEventListener("touchstart", () => {
    activeHand = "hour";
});

minuteHand.addEventListener("touchstart", () => {
    activeHand = "minute";
});

document.addEventListener("touchend", () => {
    activeHand = null;
});

document.addEventListener("touchmove", (e) => {

    const touch = e.touches[0];

    onMove(touch);
});

/* =====================================
   DEBUG + ВРЕМЯ
===================================== */
function updateDebug() {

    document.getElementById("debugAngles").innerText =
        `hour: ${hourAngle.toFixed(1)}° | minute: ${minuteAngle.toFixed(1)}°`;

    const now = new Date();

    const utc =
        now.getTime() + now.getTimezoneOffset() * 60000;

    const gmt3 =
        new Date(utc + 3 * 3600000);

    document.getElementById("currentTime").innerText =
        "GMT+3 " + gmt3.toTimeString().split(" ")[0];

    requestAnimationFrame(updateDebug);
}

updateDebug();

/* =====================================
   ПРОВЕРКА
===================================== */
function checkTime() {

    alert(
        `hour angle: ${hourAngle.toFixed(1)}\n` +
        `minute angle: ${minuteAngle.toFixed(1)}`
    );
}

</script>

</body>
</html>
