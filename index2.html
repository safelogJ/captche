<script>
const hourHand = document.getElementById("hourHand");
const minuteHand = document.getElementById("minuteHand");
const clock = document.getElementById("clock");

hourHand.ondragstart = () => false;
minuteHand.ondragstart = () => false;

/* =========================
   STATE (ВАЖНО)
========================= */
let hourAngle = 270;     // старт 9 часов
let minuteAngle = 90;    // старт 15 минут

let activeHand = null;

/* =========================
   РЕНДЕР СТРЕЛОК
========================= */
function render() {
    hourHand.style.transform =
        `translateX(-50%) rotate(${hourAngle}deg)`;

    minuteHand.style.transform =
        `translateX(-50%) rotate(${minuteAngle}deg)`;
}

/* =========================
   МЫШЬ → УГОЛ
========================= */
function getAngle(e) {
    const rect = clock.getBoundingClientRect();

    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    return Math.atan2(y, x) * 180 / Math.PI + 90;
}

/* =========================
   DRAG
========================= */
function onMove(e) {
    if (!activeHand) return;

    const angle = getAngle(e);

    if (activeHand === "hour") {
        hourAngle = angle;
    } else {
        minuteAngle = angle;
    }

    render();
}

/* =========================
   POINTER EVENTS
========================= */
hourHand.addEventListener("pointerdown", () => {
    activeHand = "hour";
});

minuteHand.addEventListener("pointerdown", () => {
    activeHand = "minute";
});

document.addEventListener("pointerup", () => {
    activeHand = null;
});

document.addEventListener("pointermove", onMove);

/* =========================
   ПЛАВНОЕ СИНХРОННОЕ ДВИЖЕНИЕ
========================= */
let last = performance.now();

function animate(now) {
    const delta = now - last;
    last = now;

    if (!activeHand) {

        // одна скорость для обеих стрелок
        const speed = 0.03; // регулирует плавность/скорость

        hourAngle += delta * speed;
        minuteAngle += delta * speed;

        hourAngle %= 360;
        minuteAngle %= 360;

        render();
    }

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

/* =========================
   INITIAL RENDER
========================= */
render();
</script>
