
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Captcha</title>

<style>

/* =====================================
   СТРАНИЦА
===================================== */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #444fff;
    font-family: Arial, sans-serif;
}

/* =====================================
   ОСНОВНОЙ КОНТЕЙНЕР
===================================== */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

/* =====================================
   ЦИФЕРБЛАТ
===================================== */
.clock {

    width: 301px;
    height: 301px;
    border-radius: 50%;
    border: 6px solid #444;
    background: #1a1a1a;
    position: relative;
}

/* =====================================
   ОБЩИЙ СТИЛЬ СТРЕЛОК
===================================== */
.hand {
    position: absolute;
    left: 50%;
    bottom: 50%;
    transform-origin: bottom center;
    border-radius: 10px;
    cursor: grab;
    /* центрирование стрелки */
    transform: translateX(-50%);
}

/* =====================================
   ЧАСОВАЯ СТРЕЛКА
===================================== */
.hour {
    width: 9px;
    height: 156px;
    background: #3b3b3b;
}

/* =====================================
   МИНУТНАЯ СТРЕЛКА
===================================== */
.minute {
    width: 9px;
    height: 156px;
    background: #444;
}

/* =====================================
   ЦЕНТР ЧАСОВ
===================================== */
.center-dot {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: red;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

   .center-dot-black {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: black;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* =====================================
   ТЕКСТОВЫЕ БЛОКИ
===================================== */
.info {
    color: black;
    font-size: 20px;
    min-width: 250px;
    text-align: center;
}

/* =====================================
   КНОПКА
===================================== */
button {

    padding: 12px 24px;
    border: none;
    background: #333;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    font-size: 16px;
}

button:hover {
    background: #555;
}

</style>
</head>

<body>

<div class="container">

    <!-- ЦИФЕРБЛАТ -->
    <div class="clock" id="clock">
        <div class="hand hour" id="hourHand"></div>
        <div class="hand minute" id="minuteHand"></div>
        <div class="center-dot"></div>
       <div class="center-dot-black"></div>
    </div>

    <!-- ВРЕМЯ -->
    <div class="info" id="currentTime">
        GMT+3 00:00:00
    </div>

    <!-- КООРДИНАТЫ -->
    <div class="info" id="debugAngles">
        hour: 0° | minute: 0°
    </div>

    <!-- КНОПКА -->
    <button onclick="checkTime()">
        Check
    </button>

</div>

<script>
/* =========================
   ПОЛУЧАЕМ ЭЛЕМЕНТЫ
   ========================= */
const hourHand = document.getElementById("hourHand");
const minuteHand = document.getElementById("minuteHand");
const clock = document.getElementById("clock");

/* какая стрелка сейчас двигается */
let activeHand = null;

/* =========================
   ВЫЧИСЛЕНИЕ УГЛА МЫШИ
   ========================= */
function getAngle(e) {
  const rect = clock.getBoundingClientRect();

  /* координаты курсора относительно центра часов */
  const x = e.clientX - rect.left - rect.width / 2;
  const y = e.clientY - rect.top - rect.height / 2;

  /* перевод в угол (в градусах) */
  return Math.atan2(y, x) * 180 / Math.PI + 90;
}

/* =========================
   ПРИМЕНЕНИЕ ПОВОРОТА
   ========================= */
function setRotation(el, angle) {
    el.style.transform = `translateX(-50%) rotate(${angle}deg)`;
}

/* =========================
   ДВИЖЕНИЕ МЫШИ / ТАЧА
   ========================= */
function onMove(e) {
  if (!activeHand) return;

  const angle = getAngle(e);

  /* выбор стрелки */
  if (activeHand === "hour") {
    setRotation(hourHand, angle);
  } else if (activeHand === "minute") {
    setRotation(minuteHand, angle);
  }
}

/* =========================
   MOUSE EVENTS
   ========================= */
hourHand.addEventListener("mousedown", () => activeHand = "hour");
minuteHand.addEventListener("mousedown", () => activeHand = "minute");
document.addEventListener("mouseup", () => activeHand = null);
document.addEventListener("mousemove", onMove);

/* =========================
   TOUCH EVENTS (телефон)
   ========================= */
hourHand.addEventListener("touchstart", () => activeHand = "hour");
minuteHand.addEventListener("touchstart", () => activeHand = "minute");
document.addEventListener("touchend", () => activeHand = null);

document.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  onMove(touch);
});

/* =========================
   ПОЛУЧЕНИЕ ТЕКУЩЕГО УГЛА СТРЕЛКИ
   ========================= */
function getRotation(el) {
  const style = window.getComputedStyle(el);
  const matrix = new DOMMatrixReadOnly(style.transform);

  const angle = Math.round(
    Math.atan2(matrix.b, matrix.a) * (180 / Math.PI)
  );

  return (angle + 360) % 360;
}

/* =========================
   ПРОВЕРКА ВРЕМЕНИ
   ========================= */
function checkTime() {

    let hours =
        Math.round(hourAngle / 30);

    if (hours === 0)
        hours = 12;

    let minutes =
        Math.round(minuteAngle / 6);

    if (minutes < 10)
        minutes = "0" + minutes;

    alert(`Time: ${hours}:${minutes}`);
}

  function updateDebug() {
  const hourDeg = getRotation(hourHand);
  const minuteDeg = getRotation(minuteHand);

  // показываем углы

     const hours =
    Math.round(hourAngle / 30);

const minutes =
    Math.round(minuteAngle / 6);

document.getElementById("debugAngles").innerText =
    `Time: ${hours}:${minutes}`;

  // текущее время браузера
  const now = new Date();

  // пример GMT+3 (ручной сдвиг)
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const gmt3 = new Date(utc + 3 * 3600000);

  document.getElementById("currentTime").innerText =
    gmt3.toTimeString().split(" ")[0];

  requestAnimationFrame(updateDebug);
}

updateDebug();
</script>

</body>
</html>
