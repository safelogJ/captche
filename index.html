<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clock Captcha</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    color: white;
  }

  .clock {
    width: 300px;
    height: 300px;
    border: 6px solid #444;
    border-radius: 50%;
    position: relative;
  }

  .hand {
    position: absolute;
    left: 50%;
    bottom: 50%;
    transform-origin: bottom center;
    transform: rotate(0deg);
    background: white;
    border-radius: 4px;
    cursor: grab;
  }

  .hour {
    width: 6px;
    height: 80px;
    background: #f5f5f5;
  }

  .minute {
    width: 4px;
    height: 110px;
    background: #aaa;
  }

  .center-dot {
    width: 12px;
    height: 12px;
    background: red;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .btn {
    position: absolute;
    bottom: 20px;
    padding: 10px 20px;
    background: #333;
    border: 1px solid #555;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="clock" id="clock">
  <div class="hand hour" id="hourHand"></div>
  <div class="hand minute" id="minuteHand"></div>
  <div class="center-dot"></div>
</div>

<button class="btn" onclick="checkTime()">Check</button>

<script>
const hourHand = document.getElementById("hourHand");
const minuteHand = document.getElementById("minuteHand");
const clock = document.getElementById("clock");

let activeHand = null;

function getAngle(e) {
  const rect = clock.getBoundingClientRect();
  const x = e.clientX - rect.left - rect.width / 2;
  const y = e.clientY - rect.top - rect.height / 2;
  return Math.atan2(y, x) * 180 / Math.PI + 90;
}

function setRotation(el, angle) {
  el.style.transform = `rotate(${angle}deg)`;
}

function onMove(e) {
  if (!activeHand) return;
  const angle = getAngle(e);

  if (activeHand === "hour") {
    setRotation(hourHand, angle);
  } else if (activeHand === "minute") {
    setRotation(minuteHand, angle);
  }
}

hourHand.addEventListener("mousedown", () => activeHand = "hour");
minuteHand.addEventListener("mousedown", () => activeHand = "minute");
document.addEventListener("mouseup", () => activeHand = null);
document.addEventListener("mousemove", onMove);

// Touch support
hourHand.addEventListener("touchstart", () => activeHand = "hour");
minuteHand.addEventListener("touchstart", () => activeHand = "minute");
document.addEventListener("touchend", () => activeHand = null);
document.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  onMove(touch);
});

function checkTime() {
  const hourDeg = getRotation(hourHand);
  const minuteDeg = getRotation(minuteHand);

  const hours = Math.floor((hourDeg % 360) / 30);
  const minutes = Math.floor((minuteDeg % 360) / 6);

  alert(`Time: ${hours}:${minutes}`);
}

function getRotation(el) {
  const style = window.getComputedStyle(el);
  const matrix = new DOMMatrixReadOnly(style.transform);
  const angle = Math.round(Math.atan2(matrix.b, matrix.a) * (180 / Math.PI));
  return (angle + 360) % 360;
}
</script>

</body>
</html>
